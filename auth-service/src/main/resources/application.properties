spring.application.name=auth-service
spring.config.import=optional:file:../.env[.properties]
server.port=${AUTH_SERVICE_PORT:8083}
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:moodit_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
%dev.spring.jpa.hibernate.ddl-auto=update
%prod.spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=${JWT_SECRET:dev-secret-insecure-change-in-production}
app.jwt.expiration=${JWT_EXPIRATION_MS:3600000}
app.cors.allowed-origins=http://${GATEWAY_HOST:localhost}:${GATEWAY_PORT:8080}
%dev.logging.level.com.moodit.auth_service=DEBUG
%prod.logging.level.com.moodit.auth_service=INFO
logging.level.org.springframework.security=WARN
app.security.pepper=${APP_SECURITY_PEPPER:dev-pepper-change-in-production}