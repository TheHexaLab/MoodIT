spring.application.name=auth-service
spring.config.import=optional:file:../.env[.properties]
# Profil actif repris de SPRING_PROFILES_ACTIVE (.env importé ou vraie variable d'env) :
# en import de properties, la forme MAJUSCULE n'active pas le profil toute seule.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}
server.port=${AUTH_SERVICE_PORT:8083}
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:moodit_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
# Schema gere par init.sql : Hibernate ne touche pas au schema par defaut (dev + sans profil).
# Surcharge en validate sous le profil prod (voir application-prod.properties).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=${JWT_SECRET:dev-secret-insecure-change-in-production}
app.jwt.expiration=${JWT_EXPIRATION_MS:3600000}
app.cors.allowed-origins=http://${GATEWAY_HOST:localhost}:${GATEWAY_PORT:8080}
logging.level.org.springframework.security=WARN
app.security.pepper=${APP_SECURITY_PEPPER:dev-pepper-change-in-production}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true