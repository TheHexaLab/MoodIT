# Surcharges actives uniquement sous le profil prod (SPRING_PROFILES_ACTIVE=prod).
# Secrets SANS valeur de repli : si la variable d'environnement manque, Spring Boot
# echoue au demarrage (placeholder non resolu) plutot que de demarrer avec un secret
# faible et public. Fail-fast voulu.
app.jwt.secret=${JWT_SECRET}
app.security.pepper=${APP_SECURITY_PEPPER}

# Schema gere par init.sql : Hibernate verifie au demarrage que le schema correspond
# aux entites et refuse de demarrer en cas de divergence (filet de securite prod).
spring.jpa.hibernate.ddl-auto=validate

# Cookie de session pose uniquement sur HTTPS en prod (jamais transmis en clair).
app.cookie.secure=${COOKIE_SECURE:true}

logging.level.com.moodit.auth_service=INFO
