spring.application.name=execution-service
spring.config.import=optional:file:../.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}
# Le gateway route /exec/** → execution-service (sans stripping) : contrôleurs sous /exec.
# Défaut 8085 (et non 8084) pour ne pas entrer en collision avec le permission-service.
server.port=${EXEC_SERVICE_PORT:8085}

# ── Piston (sandbox d'exécution du code non fiable) ───────────────────────────
# API v2 de Piston sur le réseau interne. On lui envoie fichiers + limites, il renvoie
# stdout/stderr/exit code par exécution. run_timeout ≤ 3000 ms (défaut Piston).
app.piston.base-url=${PISTON_URL:http://localhost:2000}
app.piston.run-timeout-ms=${PISTON_RUN_TIMEOUT_MS:3000}
app.piston.compile-timeout-ms=${PISTON_COMPILE_TIMEOUT_MS:10000}
# Délai HTTP max côté client (doit couvrir compile + run + marge).
app.piston.http-timeout-ms=${PISTON_HTTP_TIMEOUT_MS:20000}

# ── SQL (questions de modification, exécution isolée en 2 phases) ─────────────
# Taille max (caractères) du dump d'état transféré phase 1 → phase 2 (borne anti-DoS).
app.sql.max-dump-chars=${SQL_MAX_DUMP_CHARS:524288}

# ── Appel interne (core-service → correction des soumissions) ─────────────────
# Endpoint /internal/exec/** authentifié par un jeton partagé (identique côté core), non
# exposé par le gateway. Défense en profondeur pour l'appel service-à-service.
app.internal.token=${INTERNAL_TOKEN:dev-internal-token-change-me}

# ── Logs ──────────────────────────────────────────────────────────────────────
%dev.logging.level.com.moodit.execution_service=DEBUG
%prod.logging.level.com.moodit.execution_service=INFO
logging.level.org.springframework.security=WARN
