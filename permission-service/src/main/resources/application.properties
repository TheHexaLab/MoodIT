spring.application.name=permission-service
spring.config.import=optional:file:../.env[.properties]
server.port=${PERMISSION_SERVICE_PORT:8084}

# ── Base de données ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:moodit_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# Schema gere par init.sql : Hibernate ne touche pas au schema par defaut (dev + sans profil).
# Surcharge en validate sous le profil prod (voir application-prod.properties).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Logs ──────────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
