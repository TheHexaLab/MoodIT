spring.application.name=mcp-service
spring.config.import=optional:file:../.env[.properties]
# Profil actif repris de SPRING_PROFILES_ACTIVE (cf. core-service : en import de
# properties, seule une vraie variable d'env active le profil, d'où ce relais).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}
# ── Serveur ───────────────────────────────────────────────────────────────────
# Le gateway route /mcp/** → mcp-service:8082 (sans stripping) : les contrôleurs
# sont donc mappés directement sous /mcp (pas de préfixe /api ici).
server.port=${MCP_SERVICE_PORT:8082}
# ── Base de données (PARTAGÉE avec core-service) ──────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:moodit_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
# created_at (DEFAULT NOW()) est évalué dans le fuseau de SESSION : on le fige en UTC pour
# un stockage déterministe (indépendant du fuseau de la JVM). On réémet ensuite un ISO « Z »
# côté API (cf. util.Timestamps) → le navigateur reconvertit dans le fuseau de l'utilisateur.
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
# mcp-service ne POSSÈDE pas le schéma (créé par init.sql, géré par core-service) :
# jamais de DDL automatique, on valide seulement le mapping des entités qu'on lit/écrit.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# ── LLM (client compatible OpenAI : Groq par défaut) ───────────────────────────
# Groq (gratuit, sans carte) : LLM_API_KEY=gsk_... (obtenue sur console.groq.com).
# Fonctionne aussi avec OpenRouter/Mistral/Ollama en changeant ces variables.
# Clé absente ou appel en échec → le runner bascule sur un REPLI DÉTERMINISTE calculé
# à partir des vraies stats du cours (l'analyse aboutit quand même).
app.mcp.llm.base-url=${LLM_BASE_URL:https://api.groq.com/openai/v1}
app.mcp.llm.api-key=${LLM_API_KEY:}
app.mcp.llm.model=${LLM_MODEL:llama-3.3-70b-versatile}
# Délai max d'attente de la réponse du LLM (ms).
app.mcp.llm.timeout-ms=${LLM_TIMEOUT_MS:60000}
# ── Pont WebSocket interne vers core-service ──────────────────────────────────
# Le WS est hébergé par core-service (sessions en mémoire) : mcp-service pousse le
# résultat en appelant cet endpoint interne, qui relaie vers RealtimeEventPublisher.
app.core-service.internal-url=http://${CORE_SERVICE_HOST:localhost}:${CORE_SERVICE_PORT:8081}
# Jeton partagé entre mcp-service et core-service pour l'appel interne (défense en
# profondeur : l'endpoint /internal n'est pas exposé par le gateway, mais on l'authentifie).
app.internal.token=${INTERNAL_TOKEN:dev-internal-token-change-me}
# ── Logs ──────────────────────────────────────────────────────────────────────
%dev.logging.level.com.moodit.mcp_service=DEBUG
%prod.logging.level.com.moodit.mcp_service=INFO
logging.level.org.springframework.security=WARN
