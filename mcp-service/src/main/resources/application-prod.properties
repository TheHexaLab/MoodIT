# Surcharges actives sous le profil prod (SPRING_PROFILES_ACTIVE=prod).
#
# Jeton interne SANS valeur de repli : si INTERNAL_TOKEN manque, Spring Boot ÉCHOUE au
# démarrage (placeholder non résolu) plutôt que de démarrer avec le défaut public
# committé. Fail-fast voulu, cohérent avec JWT_SECRET / pepper côté auth-service.
app.internal.token=${INTERNAL_TOKEN}

# LLM par défaut = Ollama LOCAL (aucune donnée de forum ne sort vers un tiers). Le
# docker-compose-prod force déjà LLM_BASE_URL ; ce défaut sécurise le FALLBACK si la
# variable venait à manquer (au lieu de retomber sur Groq, externe).
app.mcp.llm.base-url=${LLM_BASE_URL:http://ollama:11434/v1}

logging.level.com.moodit.mcp_service=INFO
