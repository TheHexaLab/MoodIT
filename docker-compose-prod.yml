services:
  postgres:
    image: postgres:16
    container_name: moodit_postgres
    env_file:
      - .env.docker
    environment:
      TZ: America/Toronto
      PGTZ: America/Toronto
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  #Frontend -------------------------------------------------
  frontend:
    build: ./frontend
    container_name: moodit_frontend
    env_file:
      - .env.docker
    ports:
      - "${FRONTEND_PORT}:5173"
    networks:
      - internal
    depends_on:
      - gateway

  #Gateway -------------------------------------------------
  gateway:
    build: ./gateway
    container_name: moodit_gateway
    env_file:
      - .env.docker
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    networks:
      - internal
    depends_on:
      - core-service
      - auth-service
      - mcp-service

  #Core service -------------------------------------------------
  core-service:
    build: ./core-service
    container_name: moodit_core
    env_file:
      - .env.docker
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started

  #Auth service -------------------------------------------------
  auth-service:
    build: ./auth-service
    container_name: moodit_auth
    env_file:
      - .env.docker
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  #MCP service (analyse de cours via LLM Groq) ------------------
  mcp-service:
    build: ./mcp-service
    container_name: moodit_mcp
    env_file:
      - .env.docker
    environment:
      # Le WS vit dans core-service : mcp-service pousse ses résultats via l'endpoint interne.
      CORE_SERVICE_HOST: core-service
      # LLM = Groq (API compatible OpenAI, gratuit, sans carte). La clé LLM_API_KEY (gsk_...)
      # vient de .env.docker (secret). Base-url et modèle figés ici.
      LLM_BASE_URL: https://api.groq.com/openai/v1
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge