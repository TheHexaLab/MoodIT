# Surcharges actives uniquement sous le profil prod (SPRING_PROFILES_ACTIVE=prod).
# Secret SANS valeur de repli : si JWT_SECRET manque, Spring Boot echoue au demarrage
# plutot que d'accepter des JWT signes avec un secret public connu. Fail-fast voulu.
app.jwt.secret=${JWT_SECRET}

# Cookie-only en prod : le token en header Authorization n'est plus accepté (seul le
# cookie HttpOnly compte). Chemin d'authentification unique, pas de repli legacy.
app.auth.allow-header-token=false

logging.level.com.moodit.gateway=INFO
