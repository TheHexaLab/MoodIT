# Surcharges actives uniquement sous le profil prod (SPRING_PROFILES_ACTIVE=prod).
# Secret SANS valeur de repli : si JWT_SECRET manque, Spring Boot echoue au demarrage
# plutot que d'accepter des JWT signes avec un secret public connu. Fail-fast voulu.
app.jwt.secret=${JWT_SECRET}

# Cookie-only en prod : un token présenté hors cookie (header Authorization pour le REST,
# query ?token= pour le WS) n'est plus accepté. Chemin d'authentification unique.
app.auth.allow-legacy-token=false

# Origine(s) autorisée(s) du WebSocket (anti-CSWSH, WebSocketProxyConfig) : SANS valeur de
# repli en prod. Si FRONT_ORIGIN manque, Spring Boot échoue au démarrage (fail-fast) plutôt
# que de figer une origine dev (localhost:5173) qui rejetterait tous les handshakes légitimes.
app.cors.allowed-origins=${FRONT_ORIGIN}

logging.level.com.moodit.gateway=INFO
