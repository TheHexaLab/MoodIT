spring.application.name=gateway
spring.config.import=optional:file:../.env[.properties]
server.port=${GATEWAY_PORT:8080}
spring.cloud.gateway.server.webmvc.routes[0].id=core-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://${CORE_SERVICE_HOST:localhost}:${CORE_SERVICE_PORT:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/**
spring.cloud.gateway.server.webmvc.routes[1].id=auth-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8083}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webmvc.routes[2].id=mcp-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://${MCP_SERVICE_HOST:localhost}:${MCP_SERVICE_PORT:8082}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/mcp/**
# ── JWT ───────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev-secret-insecure-change-in-production}
# URL interne de l'auth-service pour valider le token actif (révocation / session unique)
app.auth-service.url=http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8083}
# ── Routes publiques ──────────────────────────────────────────────────────
app.public.routes=/auth/login,/auth/register,/auth/verify,/auth/verify-email,/auth/verify-2fa,/auth/resend-code
