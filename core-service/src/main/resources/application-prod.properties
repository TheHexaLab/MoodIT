# Surcharges actives uniquement sous le profil prod (SPRING_PROFILES_ACTIVE=prod).
# Secret SANS valeur de repli : si JWT_SECRET manque, Spring Boot echoue au demarrage
# plutot que d'accepter des JWT signes avec un secret public connu. Fail-fast voulu.
app.jwt.secret=${JWT_SECRET}

# Schema gere par init.sql : Hibernate verifie au demarrage que le schema correspond
# aux entites et refuse de demarrer en cas de divergence (filet de securite prod).
spring.jpa.hibernate.ddl-auto=validate

logging.level.com.moodit.core_service=INFO
