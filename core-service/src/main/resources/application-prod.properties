# Surcharges actives sous le profil prod (SPRING_PROFILES_ACTIVE=prod).
#
# Jeton interne SANS valeur de repli : si INTERNAL_TOKEN manque, le démarrage ÉCHOUE
# (placeholder non résolu) plutôt que de laisser le validateur des endpoints /internal
# se DÉSACTIVER (jeton vide → contrôle off). Fail-fast voulu, cohérent avec
# JWT_SECRET / pepper. Doit être identique au jeton configuré côté mcp-service.
app.internal.token=${INTERNAL_TOKEN}

logging.level.com.moodit.core_service=INFO
