spring.application.name=core-service
# Préfixe /api des routes REST : appliqué par WebMvcConfig (addPathPrefix), PAS par
# spring.mvc.servlet.path — sinon l'endpoint WebSocket (/ws) et le DevWsController
# (/dev/ws) passeraient aussi sous /api. Le DispatcherServlet reste à la racine.
spring.config.import=optional:file:../.env[.properties]
# Profil actif repris de SPRING_PROFILES_ACTIVE (.env importé ou vraie variable d'env).
# En import de properties, la forme MAJUSCULE n'active pas le profil toute seule (seule
# une vraie variable d'environnement le ferait) : on la relaie donc via ce placeholder.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}
# ── Serveur ───────────────────────────────────────────────────────────────────
server.port=${CORE_SERVICE_PORT:8081}
# ── Base de données ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:moodit_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
# ── JPA / Hibernate ───────────────────────────────────────────────────────────
%dev.spring.jpa.hibernate.ddl-auto=update
%prod.spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev-secret-insecure-change-in-production}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
# ── Permission service ────────────────────────────────────────────────────────
# URL interne du permission-service : autorisation des rooms WebSocket au `join`
# (RemoteRoomAuthorizer -> POST /permissions/can-join).
app.permission-service.url=http://${PERMISSION_SERVICE_HOST:localhost}:${PERMISSION_SERVICE_PORT:8084}
# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://${GATEWAY_HOST:localhost}:${GATEWAY_PORT:8080}
# ── Pont WebSocket interne (appelé par mcp-service) ───────────────────────────
# L'analyse MCP vit désormais dans mcp-service ; il pousse ses résultats via
# /internal/realtime/mcp/** (relayé vers RealtimeEventPublisher). Ce jeton partagé
# authentifie ces appels internes (doit être identique côté mcp-service).
app.internal.token=${INTERNAL_TOKEN:dev-internal-token-change-me}
# ── Logs ──────────────────────────────────────────────────────────────────────
%dev.logging.level.com.moodit.core_service=DEBUG
%prod.logging.level.com.moodit.core_service=INFO
logging.level.org.springframework.security=WARN
logging.level.com.moodit.core_service=DEBUG